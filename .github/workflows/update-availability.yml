name: Update court availability

on:
  schedule:
    - cron: '*/15 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Generate index.html
        env:
          PICKLECOURTS_API_KEY: ${{ secrets.PICKLECOURTS_API_KEY }}
        run: python3 get_availability.py | python3 generate_html.py > index.html

      - name: Commit and push if changed
        run: |
          git diff --quiet index.html && exit 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Update court availability"
          git push
